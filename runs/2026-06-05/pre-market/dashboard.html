<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BoltNews — Pre-Market | 2026-06-05</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-emphasis: #1f6feb;
    --green: #3fb950;
    --red: #f85149;
    --amber: #d29922;
    --purple: #a371f7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100dvh;
    font-size: 15px;
  }
  .container { max-width: 820px; margin: 0 auto; padding: 20px 24px; }

  /* Header */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 28px 0 20px 0;
    margin-bottom: 32px;
  }
  .header h1 { font-size: 1.6rem; font-weight: 700; color: var(--text); }
  .header .badge {
    display: inline-block;
    background: var(--accent-emphasis);
    color: #fff;
    font-size: 0.7rem;
    padding: 2px 10px;
    border-radius: 12px;
    margin-left: 10px;
    vertical-align: middle;
    font-weight: 500;
  }
  .header .subtitle { font-size: 0.82rem; color: var(--text-muted); margin-top: 6px; }

  /* Content typography */
  h1 { font-size: 1.5rem; font-weight: 700; margin: 32px 0 12px 0; color: var(--text); }
  h2 { font-size: 1.2rem; font-weight: 600; margin: 28px 0 10px 0; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  h3 { font-size: 1.05rem; font-weight: 600; margin: 20px 0 8px 0; color: var(--text); }
  p { margin: 8px 0 12px 0; color: var(--text); }
  p.bold-line { margin: 6px 0 6px 0; color: var(--text-muted); }

  /* Links */
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Lists */
  ul { margin: 4px 0 16px 20px; }
  li { margin: 3px 0; color: var(--text); }

  /* Tables */
  .table-wrapper { overflow-x: auto; margin: 12px 0 20px 0; -webkit-overflow-scrolling: touch; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }
  th {
    background: var(--bg-tertiary);
    color: var(--text-muted);
    font-weight: 600;
    text-align: left;
    padding: 8px 12px;
    border: 1px solid var(--border);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  td {
    padding: 7px 12px;
    border: 1px solid var(--border);
    color: var(--text);
  }
  tr:nth-child(even) td { background: var(--bg-secondary); }

  /* Blockquote */
  blockquote {
    border-left: 3px solid var(--accent);
    margin: 12px 0;
    padding: 8px 16px;
    background: var(--bg-secondary);
    color: var(--text-muted);
    font-style: italic;
    border-radius: 0 6px 6px 0;
  }

  /* Code */
  code {
    background: var(--bg-tertiary);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: "SF Mono", "Consolas", "Monaco", monospace;
    font-size: 0.85em;
    color: var(--accent);
  }
  code.ticker {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--accent);
    font-weight: 600;
    padding: 1px 6px;
    font-size: 0.8em;
  }

  /* Dividers */
  hr.divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 36px 0;
    color: var(--text-muted);
    font-size: 0.75rem;
    border-top: 1px solid var(--border);
    margin-top: 48px;
  }
  .footer a { color: var(--accent); }

  /* Source reference section */
  .sources-section {
    margin-top: 40px;
    padding-top: 24px;
    border-top: 2px solid var(--border);
  }
  .sources-section h2 { border-bottom: none; font-size: 1rem; }
  .source-link {
    display: inline-block;
    margin: 3px 8px 3px 0;
    padding: 4px 10px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.78rem;
    color: var(--text-muted);
    text-decoration: none;
  }
  .source-link:hover { border-color: var(--accent); color: var(--text); }

  /* Mobile */
  @media (max-width: 600px) {
    .container { padding: 12px 16px; }
    .header h1 { font-size: 1.3rem; }
    h2 { font-size: 1.05rem; }
    table { font-size: 0.78rem; }
    th, td { padding: 5px 8px; }
  }
  @supports (-webkit-touch-callout: none) {
    body { min-height: -webkit-fill-available; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>⚡ BoltNews <span class="badge">Pre-Market</span></h1>
    <div class="subtitle">2026-06-05 &middot; 0 articles &middot; 0 categories</div>
  </div>

  <div class="content">
    <h1>BoltNews — Pre-Market</h1>
<p><strong>2026-06-05</strong> | 0 articles</p>
<p><em>No market-moving news found in the past 48 hours.</em></p>
  </div>

  

  <div class="footer">
    BoltNews &copy; 2026 &middot; Generated 2026-06-05 &middot; 
    <a href="https://github.com/ZeusNightBolt/BoltNews">GitHub</a>
  </div>
</div>
</body>
</html>
